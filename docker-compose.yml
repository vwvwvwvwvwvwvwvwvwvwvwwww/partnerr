name: agroerp

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: agro-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agro_erp
      POSTGRES_USER: agro_erp_user
      POSTGRES_PASSWORD: change_me_securely
    ports:
      - '5432:5432'
    volumes:
      - agro_erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agro_erp_user -d agro_erp']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

volumes:
  agro_erp_pgdata:
