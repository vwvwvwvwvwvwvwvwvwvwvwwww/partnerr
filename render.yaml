# Blueprint для https://render.com
# SQLite — отдельная PostgreSQL не нужна.
# После деплоя в Shell: create-admin, seed-staff, seed-sqlite-demo (см. docs/GITHUB-AND-HOST.md)

services:
  - type: web
    name: agro-erp
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: npm install && npm run install:all && npm run build
    startCommand: npm run start:railway
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DRIVER
        value: sqlite
      - key: SQLITE_PATH
        value: ./backend/data/agro_erp.sqlite
      - key: VITE_API_URL
        value: /api
      - key: APP_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
